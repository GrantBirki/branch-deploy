name: release-build

on:
  workflow_call:
    inputs:
      source_sha:
        description: The immutable source commit to build
        required: true
        type: string
      tree_sha:
        description: The expected source tree
        required: true
        type: string
      source_date_epoch:
        description: The source commit timestamp used for deterministic archives
        required: true
        type: string
      version:
        description: The validated release version
        required: true
        type: string
      previous_stable_tag:
        description: The stable release used as the generated-notes baseline
        required: true
        type: string
      perform_attestation:
        description: Generate GitHub build-provenance and SBOM attestations
        required: false
        default: false
        type: boolean
    outputs:
      artifact_id:
        description: The immutable Actions artifact ID
        value: ${{ jobs.build.outputs.artifact_id }}
      artifact_digest:
        description: The SHA-256 digest reported by upload-artifact
        value: ${{ jobs.build.outputs.artifact_digest }}
      artifact_name:
        description: The unique Actions artifact name
        value: ${{ jobs.build.outputs.artifact_name }}

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: checkout the immutable source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version-file: .node-version

      - name: verify immutable build inputs
        env:
          CALLER_SHA: ${{ github.sha }}
          EXPECTED_SHA: ${{ inputs.source_sha }}
          EXPECTED_TREE: ${{ inputs.tree_sha }}
          EXPECTED_TIMESTAMP: ${{ inputs.source_date_epoch }}
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          actual_tree=$(git rev-parse 'HEAD^{tree}')
          actual_timestamp=$(git show --no-patch --format=%ct HEAD)
          actual_version=$(node --input-type=module --eval "import {VERSION} from './src/version.ts'; process.stdout.write(VERSION)")

          if [[ $(node --version) != 'v24.9.0' ]]; then
            echo 'Release builds require Node v24.9.0.'
            exit 1
          fi
          if [[ $(npm --version) != '11.6.0' ]]; then
            echo 'Release builds require the npm 11.6.0 bundled with Node v24.9.0.'
            exit 1
          fi

          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'The source SHA must be a full lowercase commit SHA.'
            exit 1
          fi

          if [[ "$EXPECTED_SHA" != "$CALLER_SHA" ]]; then
            echo 'Build provenance can only describe the commit that invoked the reusable workflow.'
            exit 1
          fi

          test "$actual_sha" = "$EXPECTED_SHA"
          test "$actual_tree" = "$EXPECTED_TREE"
          test "$actual_timestamp" = "$EXPECTED_TIMESTAMP"
          test "$actual_version" = "$EXPECTED_VERSION"

      - name: install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: check the complete project
        run: npm run check

      - name: rebuild the committed action bundle
        run: |
          compatibility_loader="$RUNNER_TEMP/sourcemap-register.js"
          cp dist/sourcemap-register.js "$compatibility_loader"
          rm -rf dist
          npm run package

          if [[ -e dist/sourcemap-register.js ]]; then
            echo 'ncc now emits sourcemap-register.js; review the compatibility-loader policy.'
            exit 1
          fi
          cp "$compatibility_loader" dist/sourcemap-register.js

          if [[ -n "$(git status --porcelain --untracked-files=all -- dist/)" ]]; then
            echo "The release build did not reproduce the committed dist/ directory."
            git status --short --untracked-files=all -- dist/
            git diff -- dist/
            exit 1
          fi
          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo 'Project checks or packaging changed the frozen checkout.'
            git status --short --untracked-files=all
            git diff
            exit 1
          fi

      - name: smoke test the ESM bundle
        env:
          BRANCH_DEPLOY_VITEST_TEST: 'true'
        run: node --input-type=module --eval "const action = await import('./dist/index.js'); if (typeof action.run !== 'function') throw new Error('dist/index.js does not export run')"

      - name: build deterministic release assets
        id: assets
        env:
          PREVIOUS_STABLE_TAG: ${{ inputs.previous_stable_tag }}
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
          SOURCE_DATE_EPOCH: ${{ inputs.source_date_epoch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          TREE_SHA: ${{ inputs.tree_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p "$RELEASE_DIRECTORY"
          node script/release-artifacts.ts build \
            --version "$VERSION" \
            --source-sha "$SOURCE_SHA" \
            --tree-sha "$TREE_SHA" \
            --previous-stable-tag "$PREVIOUS_STABLE_TAG" \
            --source-date-epoch "$SOURCE_DATE_EPOCH" \
            --output-dir "$RELEASE_DIRECTORY" \
            --output "$GITHUB_OUTPUT"

      - name: verify deterministic asset set
        env:
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
          SOURCE_SHA: ${{ inputs.source_sha }}
          TREE_SHA: ${{ inputs.tree_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          prefix="branch-deploy-$VERSION"
          expected="$RUNNER_TEMP/expected-assets"
          actual="$RUNNER_TEMP/actual-assets"

          printf '%s\n' \
            "$prefix.release.json" \
            "$prefix.spdx.json" \
            "$prefix.tar.gz" \
            'SHA256SUMS' | sort > "$expected"
          find "$RELEASE_DIRECTORY" -maxdepth 1 -type f -printf '%f\n' | sort > "$actual"
          diff --unified "$expected" "$actual"
          {
            printf '%s  %s\n' "$(sha256sum "$RELEASE_DIRECTORY/$prefix.tar.gz" | cut -d ' ' -f 1)" "$prefix.tar.gz"
            printf '%s  %s\n' "$(sha256sum "$RELEASE_DIRECTORY/$prefix.spdx.json" | cut -d ' ' -f 1)" "$prefix.spdx.json"
            printf '%s  %s\n' "$(sha256sum "$RELEASE_DIRECTORY/$prefix.release.json" | cut -d ' ' -f 1)" "$prefix.release.json"
          } > "$RUNNER_TEMP/expected-SHA256SUMS"
          cmp "$RUNNER_TEMP/expected-SHA256SUMS" "$RELEASE_DIRECTORY/SHA256SUMS"
          node script/release-artifacts.ts verify \
            --version "$VERSION" \
            --source-sha "$SOURCE_SHA" \
            --tree-sha "$TREE_SHA" \
            --output-dir "$RELEASE_DIRECTORY"

          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo 'Release asset generation changed the frozen checkout.'
            git status --short --untracked-files=all
            git diff
            exit 1
          fi

      - name: scan generated assets for local or sensitive material
        env:
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
        run: |
          if grep --recursive --binary-files=without-match --extended-regexp \
            '(/home/runner/work/|/Users/|file:///|BEGIN [A-Z ]*PRIVATE KEY|github_pat_[A-Za-z0-9_]{20,}|gh[pousr]_[A-Za-z0-9]{30,})' \
            "$RELEASE_DIRECTORY" action.yml dist; then
            echo 'Generated release assets contain local paths or credential-like material.'
            exit 1
          fi

      - name: attest build provenance
        id: provenance
        if: ${{ inputs.perform_attestation }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # pin@v4.1.0
        with:
          subject-path: ${{ steps.assets.outputs.subject_paths }}

      - name: preserve the provenance bundle
        if: ${{ inputs.perform_attestation }}
        env:
          BUNDLE_PATH: ${{ steps.provenance.outputs.bundle-path }}
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
          VERSION: ${{ inputs.version }}
        run: cp "$BUNDLE_PATH" "$RELEASE_DIRECTORY/branch-deploy-$VERSION.provenance.sigstore.jsonl"

      - name: attest the release SBOM
        id: sbom
        if: ${{ inputs.perform_attestation }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # pin@v4.1.0
        with:
          subject-path: ${{ runner.temp }}/release/branch-deploy-${{ inputs.version }}.tar.gz
          sbom-path: ${{ runner.temp }}/release/branch-deploy-${{ inputs.version }}.spdx.json

      - name: preserve the SBOM attestation bundle
        if: ${{ inputs.perform_attestation }}
        env:
          BUNDLE_PATH: ${{ steps.sbom.outputs.bundle-path }}
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
          VERSION: ${{ inputs.version }}
        run: cp "$BUNDLE_PATH" "$RELEASE_DIRECTORY/branch-deploy-$VERSION.sbom.sigstore.jsonl"

      - name: verify complete production asset set
        if: ${{ inputs.perform_attestation }}
        env:
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
          VERSION: ${{ inputs.version }}
        run: |
          prefix="branch-deploy-$VERSION"
          expected="$RUNNER_TEMP/expected-production-assets"
          actual="$RUNNER_TEMP/actual-production-assets"

          printf '%s\n' \
            "$prefix.provenance.sigstore.jsonl" \
            "$prefix.release.json" \
            "$prefix.sbom.sigstore.jsonl" \
            "$prefix.spdx.json" \
            "$prefix.tar.gz" \
            'SHA256SUMS' | sort > "$expected"
          find "$RELEASE_DIRECTORY" -maxdepth 1 -type f -printf '%f\n' | sort > "$actual"
          diff --unified "$expected" "$actual"

      - name: name the immutable Actions artifact
        id: metadata
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_ID: ${{ github.run_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
        run: echo "artifact_name=release-$VERSION-$SOURCE_SHA-$RUN_ID-$RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: upload the release set once
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ${{ runner.temp }}/release/
          if-no-files-found: error
          compression-level: 0
          overwrite: false
