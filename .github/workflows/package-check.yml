name: package-check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  package:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      previous_stable_tag: ${{ steps.release-metadata.outputs.previous_stable_tag }}
      release_sensitive: ${{ steps.release-changes.outputs.release_sensitive }}
      source_date_epoch: ${{ steps.release-metadata.outputs.source_date_epoch }}
      source_sha: ${{ steps.release-metadata.outputs.source_sha }}
      tree_sha: ${{ steps.release-metadata.outputs.tree_sha }}
      version: ${{ steps.release-metadata.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version-file: .node-version

      - name: collect release dry-build metadata
        id: release-metadata
        run: |
          version=$(node --input-type=module --eval "import {VERSION} from './src/version.ts'; process.stdout.write(VERSION)")
          previous_stable_tag=$(git tag --list --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          {
            echo "previous_stable_tag=$previous_stable_tag"
            echo "source_date_epoch=$(git show --no-patch --format=%ct HEAD)"
            echo "source_sha=$(git rev-parse HEAD)"
            echo "tree_sha=$(git rev-parse 'HEAD^{tree}')"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: rebuild the dist/ directory
        run: npm run package

      - name: compare the expected and actual dist/ directories
        run: |
          if [[ -n "$(git status --porcelain --untracked-files=all -- dist/)" ]]; then
            echo "Detected changes in dist/ after build. See status below:"
            git status --short --untracked-files=all -- dist/
            git diff -- dist/
            exit 1
          fi
        id: diff

      - name: smoke test the ESM bundle
        env:
          BRANCH_DEPLOY_VITEST_TEST: 'true'
        run: node --input-type=module --eval "const action = await import('./dist/index.js'); if (typeof action.run !== 'function') throw new Error('dist/index.js does not export run')"

      - name: detect release-sensitive pull request changes
        id: release-changes
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          release_sensitive=false
          version_changed=false

          while IFS= read -r path; do
            case "$path" in
              src/version.ts)
                release_sensitive=true
                version_changed=true
                ;;
              .github/workflows/release.yml | \
              .github/workflows/release-build.yml | \
              .github/workflows/package-check.yml | \
              src/release-artifacts.ts | \
              src/release-policy.ts | \
              script/release-artifacts.ts | \
              __tests__/release-policy.test.ts | \
              __tests__/release-artifacts.test.ts | \
              __tests__/release-workflow-policy.test.ts | \
              package.json | \
              package-lock.json | \
              .node-version)
                release_sensitive=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          echo "release_sensitive=$release_sensitive" >> "$GITHUB_OUTPUT"
          echo "version_changed=$version_changed" >> "$GITHUB_OUTPUT"

      - name: validate the proposed version transition
        if: ${{ steps.release-changes.outputs.version_changed == 'true' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          base_version_file="$RUNNER_TEMP/base-version.ts"
          git show "$BASE_SHA:src/version.ts" > "$base_version_file"
          base_version=$(node --input-type=module --eval "import {pathToFileURL} from 'node:url'; const versionModule = await import(pathToFileURL(process.argv[1]).href); process.stdout.write(versionModule.VERSION)" "$base_version_file")
          node script/release-artifacts.ts validate --previous "$base_version"

          version=$(node --input-type=module --eval "import {VERSION} from './src/version.ts'; process.stdout.write(VERSION)")
          node script/release-artifacts.ts validate --previous v11.1.5 --next "$version"
          for endpoint in \
            "repos/$GITHUB_REPOSITORY/git/ref/tags/$version" \
            "repos/$GITHUB_REPOSITORY/releases/tags/$version"; do
            if response=$(gh api "$endpoint" 2>&1); then
              echo "The proposed version conflicts with an existing tag or release: $version"
              exit 1
            elif [[ "$response" != *'(HTTP 404)'* ]]; then
              echo "GitHub could not confirm that the proposed version is unused."
              echo "$response"
              exit 1
            fi
          done

      # If index.js was different than expected, upload the expected version as an artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/

  release-dry-build:
    needs: package
    if: ${{ needs.package.outputs.release_sensitive == 'true' }}
    uses: ./.github/workflows/release-build.yml
    permissions:
      contents: read
    with:
      perform_attestation: false
      previous_stable_tag: ${{ needs.package.outputs.previous_stable_tag }}
      source_date_epoch: ${{ needs.package.outputs.source_date_epoch }}
      source_sha: ${{ needs.package.outputs.source_sha }}
      tree_sha: ${{ needs.package.outputs.tree_sha }}
      version: ${{ needs.package.outputs.version }}

  package-check:
    needs:
      - package
      - release-dry-build
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: require package and release dry-build success
        env:
          PACKAGE_RESULT: ${{ needs.package.result }}
          RELEASE_DRY_BUILD_RESULT: ${{ needs.release-dry-build.result }}
          RELEASE_SENSITIVE: ${{ needs.package.outputs.release_sensitive }}
        run: |
          if [[ "$PACKAGE_RESULT" != 'success' ]]; then
            echo 'The package job did not succeed.'
            exit 1
          fi

          if [[ "$RELEASE_SENSITIVE" == 'true' ]]; then
            if [[ "$RELEASE_DRY_BUILD_RESULT" != 'success' ]]; then
              echo 'The release dry build did not succeed.'
              exit 1
            fi
          elif [[ "$RELEASE_DRY_BUILD_RESULT" != 'skipped' ]]; then
            echo 'The release dry build ran for a pull request without release-sensitive changes.'
            exit 1
          fi
